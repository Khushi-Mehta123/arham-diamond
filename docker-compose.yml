version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: diamond_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - diamond_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diamond_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/uploads
    command: npm run dev
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/arham_diamonds
      - JWT_SECRET=supersecretjwtkey123!@#
      - NODE_ENV=development
      - CLOUDINARY_CLOUD_NAME=kqhzg7cx
      - CLOUDINARY_API_KEY=314629197748748
      - CLOUDINARY_API_SECRET=4CvQaR6geqUkD0tN6K-t6u1O7ng
    depends_on:
      - db
    networks:
      - diamond_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diamond_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev -- --host
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - diamond_network

volumes:
  mongo_data:

networks:
  diamond_network:
    driver: bridge
